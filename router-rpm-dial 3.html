<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Router RPM Dial</title>

<style>

:root{
    --window-width: 200px;
    --step-width: 34px;
}

/* PAGE */
body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* PANEL */
.controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;

    padding:18px;
    background:linear-gradient(180deg,#e9e9e9,#d9d9d9);
    border-radius:16px;
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,.6),
        0 12px 25px rgba(0,0,0,.2);

    width:300px;
}

/* ROUTER BODY */
.router-body{
    width:300px;
    height:140px;
    position:relative;

    background:
        linear-gradient(180deg,#3b3b3b 0%, #262626 45%, #1c1c1c 100%);

    border-radius:18px;

    box-shadow:
        inset 0 2px 6px rgba(255,255,255,.12),
        0 8px 20px rgba(0,0,0,.35);
}

/* WINDOW */
.window{
    position:absolute;
    top:28px;
    left:50%;
    transform:translateX(-50%);

    width:var(--window-width);
    height:60px;

    overflow:hidden;

    background:#111;
    border-radius:10px;

    box-shadow: inset 0 0 10px rgba(0,0,0,.9);
}

/* DRUM */
.drum{
    position:absolute;
    top:0;
    left:0;
    display:flex;
    align-items:center;
    height:100%;
    transition:transform .25s ease;
}

.tick-step{
    width:var(--step-width);
    height:100%;
    flex-shrink:0;
    position:relative;

    background: radial-gradient(circle at center,#fff 0%,#e9e9e9 50%,#cfcfcf 100%);
}

/* TICK AREA (TOP ZONE ONLY) */
.major-tick{
    position:absolute;
    top:4px;
    left:50%;
    transform:translateX(-50%);
    width:3px;
    height:18px;   /* reduced */
    background:#111;
}

.minor-tick{
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    width:2px;
    height:12px;   /* reduced */
    background:#222;
}

/* LABEL IS NOW IN ITS OWN CLEAR ZONE */
.tick-label{
    position:absolute;
    left:50%;
    bottom:6px;    /* move away from ticks */
    transform:translateX(-50%);

    font-size:16px;
    font-weight:bold;
    color:#111;

    background:rgba(255,255,255,0.6);
    padding:1px 3px;
    border-radius:3px;
}

/* POINTER */
.pointer{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:92px;

    width:0;
    height:0;

    border-left:12px solid transparent;
    border-right:12px solid transparent;
    border-bottom:22px solid white;

    filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));
}

/* RPM DISPLAY */
.rpm{
    font-size:42px;
    font-weight:bold;
    letter-spacing:1px;
    margin-top:4px;
}

.rpm-label{
    font-size:14px;
    margin-top:-4px;
}

/* BUTTON BAR */
.control-bar{
    width:300px;
    display:grid;
    grid-template-columns:1fr 1fr;
}

.control-btn{
    height:52px;
    border:none;
    background:white;
    font-size:28px;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
    transition:.12s;
}

.control-btn:active{
    transform:translateY(1px);
}

#minusBtn{
    border-radius:10px 0 0 10px;
    border-right:1px solid #ddd;
}

#plusBtn{
    border-radius:0 10px 10px 0;
}

/* RESPONSIVE SAFETY */
@media (max-width:400px){
    .controls{
        transform:scale(.95);
    }
}

</style>
</head>

<body>

<div class="controls">

    <div class="router-body">

        <div class="window">
            <div id="drum" class="drum"></div>
        </div>

        <div class="pointer"></div>

    </div>

    <div id="rpm" class="rpm">8,000</div>
    <div class="rpm-label">RPM</div>

    <div class="control-bar">
        <button id="minusBtn" class="control-btn">−</button>
        <button id="plusBtn" class="control-btn">+</button>
    </div>

</div>

<script>

const positions = [
    { label:"6",   rpm:24200 },
    { label:"5⅔",  rpm:22800 },
    { label:"5⅓",  rpm:21500 },
    { label:"5",   rpm:20300 },
    { label:"4⅔",  rpm:19200 },
    { label:"4⅓",  rpm:18200 },
    { label:"4",   rpm:17300 },
    { label:"3⅔",  rpm:16200 },
    { label:"3⅓",  rpm:15400 },
    { label:"3",   rpm:14300 },
    { label:"2⅔",  rpm:13000 },
    { label:"2⅓",  rpm:12000 },
    { label:"2",   rpm:10800 },
    { label:"1⅔",  rpm:9500 },
    { label:"1⅓",  rpm:8500 },
    { label:"1",   rpm:8000 }
];

const drum = document.getElementById("drum");
const rpmDisplay = document.getElementById("rpm");

const STEP_WIDTH = 34;
const WINDOW_WIDTH = 200;

let index = 15;

/* BUILD DRUM */
positions.forEach(position => {

    const step = document.createElement("div");
    step.className = "tick-step";

    const tick = document.createElement("div");

    if(position.label.includes("⅓") || position.label.includes("⅔")){
        tick.className = "minor-tick";
    } else {
        tick.className = "major-tick";
    }

    const label = document.createElement("div");
    label.className = "tick-label";

    if(!position.label.includes("⅓") && !position.label.includes("⅔")){
        label.textContent = position.label;
    }

    step.appendChild(tick);
    step.appendChild(label);
    drum.appendChild(step);
});

/* UPDATE */
function updateDial(){

    const centerOffset =
        (WINDOW_WIDTH / 2) -
        (STEP_WIDTH / 2);

    drum.style.transform =
        `translateX(${centerOffset - (index * STEP_WIDTH)}px)`;

    rpmDisplay.textContent =
        positions[index].rpm.toLocaleString();
}

function increment(){
    if(index < positions.length - 1){
        index++;
        updateDial();
    }
}

function decrement(){
    if(index > 0){
        index--;
        updateDial();
    }
}

/* EVENTS */
document.getElementById("plusBtn").addEventListener("click", increment);
document.getElementById("minusBtn").addEventListener("click", decrement);

document.querySelector(".router-body").addEventListener("wheel", e => {
    e.preventDefault();
    if(e.deltaY > 0) increment();
    else decrement();
}, { passive:false });

document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") increment();
    if(e.key === "ArrowLeft") decrement();
});

updateDial();

</script>

</body>
</html>
