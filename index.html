<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Router RPM Dial</title>

<style>

:root{
    --window-width: 200px;
    --step-width: 34px;
}

/* PAGE */
body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:300px;
}

/* MAIN INSTRUMENT WINDOW */
.window{
    width:300px;
    height:120px;

    background:#111;
    border-radius:14px;
    overflow:hidden;

    box-shadow: inset 0 0 12px rgba(0,0,0,.9);

    display:flex;
    flex-direction:column;
    align-items:center;

    /* SYMMETRIC PADDING FIX */
    padding:10px 8px;
    box-sizing:border-box;

    position:relative;
}

/* DRUM */
.drum-viewport{
    width:200px;
    height:55px;
    position:relative;
    overflow:hidden;

    /* push down so top/bottom visual balance matches padding */
    margin-top:6px;
    margin-bottom:6px;
}

.drum{
    position:absolute;
    top:0;
    left:0;
    display:flex;
    height:100%;
    align-items:center;
    transition:transform .25s ease;
}

.tick-step{
    width:34px;
    height:100%;
    position:relative;
    flex-shrink:0;

    background: radial-gradient(circle at center,#fff 0%,#e9e9e9 50%,#cfcfcf 100%);
}

/* ticks */
.major-tick{
    position:absolute;
    top:3px;
    left:50%;
    transform:translateX(-50%);
    width:3px;
    height:16px;
    background:#111;
}

.minor-tick{
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    width:2px;
    height:10px;
    background:#222;
}

/* labels */
.tick-label{
    position:absolute;
    left:50%;
    bottom:2px;
    transform:translateX(-50%);
    font-size:18px;
    font-weight:bold;
    color:#111;
}

/* FIXED POINTER (HIGH CONTRAST UPGRADE) */
.pointer{
    position:absolute;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;

    width:0;
    height:0;

    border-left:10px solid transparent;
    border-right:10px solid transparent;

    /* CHANGED: high contrast orange */
    border-top:16px solid #c60707;

    filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
}

/* RPM ROW */
.rpm-row{
    margin-top:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

/* BUTTONS */
.btn{
    width:42px;
    height:34px;
    border:none;
    background:#f2f2f2;
    font-size:20px;
    cursor:pointer;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.rpm{
    font-size:34px;
    font-weight:bold;
    color:#fff;
    min-width:110px;
    text-align:center;
    line-height:1;
}

.btn:active{
    transform:translateY(1px);
}

</style>
</head>

<body>

<div class="container">

    <div class="window">

        <div class="pointer"></div>

        <div class="drum-viewport">
            <div id="drum" class="drum"></div>
        </div>

        <div class="rpm-row">

            <button id="minusBtn" class="btn">+</button>

            <div id="rpm" class="rpm">8,000</div>

            <button id="plusBtn" class="btn">−</button>

        </div>

    </div>

</div>

<script>

const positions = [
    { label:"6", rpm:24200 },
    { label:"5⅔", rpm:22800 },
    { label:"5⅓", rpm:21500 },
    { label:"5", rpm:20300 },
    { label:"4⅔", rpm:19200 },
    { label:"4⅓", rpm:18200 },
    { label:"4", rpm:17300 },
    { label:"3⅔", rpm:16200 },
    { label:"3⅓", rpm:15400 },
    { label:"3", rpm:14300 },
    { label:"2⅔", rpm:13000 },
    { label:"2⅓", rpm:12000 },
    { label:"2", rpm:10800 },
    { label:"1⅔", rpm:9500 },
    { label:"1⅓", rpm:8500 },
    { label:"1", rpm:8000 }
];

const drum = document.getElementById("drum");
const rpmDisplay = document.getElementById("rpm");

const STEP_WIDTH = 34;
const WINDOW_WIDTH = 200;

let index = 15;

/* BUILD DRUM */
positions.forEach(p => {

    const step = document.createElement("div");
    step.className = "tick-step";

    const tick = document.createElement("div");
    tick.className =
        (p.label.includes("⅓") || p.label.includes("⅔"))
        ? "minor-tick"
        : "major-tick";

    const label = document.createElement("div");
    label.className = "tick-label";

    if(!p.label.includes("⅓") && !p.label.includes("⅔")){
        label.textContent = p.label;
    }

    step.appendChild(tick);
    step.appendChild(label);
    drum.appendChild(step);
});

/* UPDATE */
function updateDial(){

    const centerOffset =
        (WINDOW_WIDTH / 2) -
        (STEP_WIDTH / 2);

    drum.style.transform =
        `translateX(${centerOffset - (index * STEP_WIDTH)}px)`;

    rpmDisplay.textContent =
        positions[index].rpm.toLocaleString();
}

/* CONTROLS */
function inc(){
    if(index < positions.length - 1){
        index++;
        updateDial();
    }
}

function dec(){
    if(index > 0){
        index--;
        updateDial();
    }
}

document.getElementById("plusBtn").onclick = inc;
document.getElementById("minusBtn").onclick = dec;

document.querySelector(".drum-viewport").addEventListener("wheel", e => {
    e.preventDefault();
    e.deltaY > 0 ? inc() : dec();
},{passive:false});

document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") inc();
    if(e.key === "ArrowLeft") dec();
});

updateDial();

</script>

</body>
</html>
